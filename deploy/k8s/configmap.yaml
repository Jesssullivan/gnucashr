apiVersion: v1
kind: ConfigMap
metadata:
  name: gnucashr-config
  labels:
    app: gnucashr
data:
  daemon.json: |
    {
        "entries": [
            {
                "agent": "/usr/local/share/gnucash-mcp/dhall/agents/spend-monitor.dhall",
                "book": "/data/finances.gnucash"
            },
            {
                "agent": "/usr/local/share/gnucash-mcp/dhall/agents/bank-feed-importer.dhall",
                "book": "/data/finances.gnucash"
            },
            {
                "agent": "/usr/local/share/gnucash-mcp/dhall/agents/transaction-categorizer.dhall",
                "book": "/data/finances.gnucash"
            },
            {
                "agent": "/usr/local/share/gnucash-mcp/dhall/agents/reconciler.dhall",
                "book": "/data/finances.gnucash"
            }
        ],
        "poll_interval_seconds": 3600,
        "log_file": "/var/log/gnucashr-daemon.log"
    }
